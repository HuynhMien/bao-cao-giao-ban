<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Tổng Hợp Báo Cáo Giao Ban</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f1f5f9; color: #1e293b; margin:0; padding:20px; }
        .container { max-width: 1450px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .header h1 { margin:0; font-size:24px; color: #0284c7; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .card-title { font-size: 16px; font-weight: bold; color: #0369a1; border-left: 4px solid #0284c7; padding-left: 10px; margin-bottom: 20px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; }
        th, td { border: 1px solid #cbd5e1; padding: 10px; }
        th { background-color: #f8fafc; color: #334155; font-weight: bold; }
        tr:hover { background-color: #f8fafc; }
        .txt-bold { font-weight: bold; }
        .bg-total { background-color: #f0f9ff; font-weight: bold; color: #0369a1; }
        .btn { padding: 10px 20px; background-color: #0284c7; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>BỆNH VIỆN ĐA KHOA KHU VỰC HỒNG NGỰ - DASHBOARD TỔNG HỢP</h1>
        <a href="index.html" class="btn">✏️ VÀO TRANG NHẬP BÁO CÁO</a>
    </div>

    <div class="card">
        <div class="card-title">I. Tình hình người bệnh điều trị nội trú & Thủ thuật các khoa lâm sàng</div>
        <div style="overflow-x: auto;">
            <table>
                <thead id="thdClinical"></thead>
                <tbody id="tbyClinical"></tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <div class="card-title">II. Bảng thống kê chỉ số xét nghiệm chi tiết theo khoa chỉ định</div>
        <div style="overflow-x: auto;">
            <table>
                <thead id="thdXetNghiem"></thead>
                <tbody id="tbyXetNghiem"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const GET_DATA_URL = 'https://script.google.com/macros/s/AKfycbxJiK63P9G3LfdKCyjh3Ak4il9ugm7iPB6AxCzvW866B4mKcHzznQpr0MyF3whBKyJ1/exec';

    // Cấu trúc động phải khớp chính xác với file index.html
    const CLINICAL_PROCEDURES = [
        { field: "tiemKhop", label: "Tiêm Khớp" },
        { field: "boBot", label: "Bó Bột" },
        { field: "thayBang", label: "Thay Băng" }
    ];

    const XN_SERVICES = [
        { field: "procalcitonin", label: "Procalcitonin" },
        { field: "bnp", label: "BNP" },
        { field: "khiMauDongMach", label: "Khí Máu ĐM" },
        { field: "xnNgoaiTru", label: "XN Ngoại Trú" },
        { field: "xnNoiTru", label: "XN Nội Trú" }
    ];

    const CLINICAL_KHOAS = [
        "KHOA CẤP CỨU - HSTC - CHỐNG ĐỘC", "KHOA PHẪU THUẬT GÂY MÊ HỒI SỨC", "KHOA NGOẠI TỔNG HỢP", "KHOA PHỤ SẢN", 
        "KHOA NỘI TỔNG HỢP", "KHOA NỘI TIM MẠCH - LÃO HỌC", "KHOA NHI", "KHOA TRUYỀN NHIỄM", "KHOA Y DƯỢC CỔ TRUYỀN", 
        "KHOA LIÊN CHUYÊN KHOA"
    ];

    async function loadDashboardData() {
        try {
            const res = await fetch(GET_DATA_URL);
            const rawJson = await res.json();
            
            renderClinicalTable(rawJson.dataSheet);
            renderXetNghiemTable(rawJson.clsSheet);
        } catch (e) { alert("Không thể tải số liệu cấu trúc tổng hợp."); }
    }

    function renderClinicalTable(data) {
        const todayStr = new Date().toISOString().split('T')[0];
        const todayData = data.filter(r => r["Ngày"] === todayStr);

        // 1. Dựng Tiêu đề động cho Khối Lâm Sàng
        const thd = document.getElementById('thdClinical');
        thd.innerHTML = `
            <tr>
                <th rowspan="2">STT</th>
                <th rowspan="2" style="text-align:left;">Tên Đơn Vị Khoa Phòng</th>
                <th rowspan="2">Lượt Khám Ngoại Trú</th>
                <th colspan="3">Đang Điều Trị Nội Trú</th>
                <th colspan="7">Kết Thúc Điều Trị / Ra Viện Trong Ngày</th>
                <th rowspan="2" style="background-color:#fef08a;">Còn Lại</th>
                <th colspan="${CLINICAL_PROCEDURES.length}">Phẫu Thuật - Thủ Thuật Tại Khoa</th>
            </tr>
            <tr>
                <th>Bệnh Cũ</th><th>Bệnh Mới</th><th>Chuyển Đến</th>
                <th>Ra Viện</th><th>Xin Về (Ổn)</th><th>Xin Về (Nặng)</th><th>Chuyển Khoa</th><th>Bỏ Viện</th><th>Tử Vong</th><th>Chuyển Viện</th>
                ${CLINICAL_PROCEDURES.map(p => `<th>${p.label}</th>`).join('')}
            </tr>`;

        // 2. Điền Số Liệu
        const tby = document.getElementById('tbyClinical');
        let html = "";
        
        let totals = { kham:0, cu:0, moi:0, den:0, ra:0, v_on:0, v_nang:0, c_khoa:0, bo:0, tvong:0, cvien:0, conlai:0 };
        CLINICAL_PROCEDURES.forEach(p => totals[p.field] = 0);

        CLINICAL_KHOAS.forEach((khoa, idx) => {
            const match = todayData.find(r => r["Khoa"] === khoa) || {};
            
            let cu = Number(match.benhCu || 0), moi = Number(match.benhMoi || 0), den = Number(match.chuyenKhoa || 0);
            let ra = Number(match.xuatVien || 0), v_on = Number(match.xinVeBenhOn || 0), v_nang = Number(match.xinVeBenhNang || 0);
            let ck = Number(match.chuyenDiCacKhoa || 0), bo = Number(match.boVe || 0), tv = Number(match.tuVong || 0), cv = Number(match.chuyenVien || 0);
            
            let conLai = (cu + moi + den) - (ra + v_on + v_nang + ck + bo + tv + cv);

            totals.cu += cu; totals.moi += moi; totals.den += den; totals.ra += ra;
            totals.v_on += v_on; totals.v_nang += v_nang; totals.c_khoa += ck;
            totals.bo += bo; totals.tvong += tv; totals.cvien += cv; totals.conlai += conLai;

            let ptsHtml = "";
            CLINICAL_PROCEDURES.forEach(p => {
                let val = Number(match[p.field] || 0);
                totals[p.field] += val;
                ptsHtml += `<td>${val}</td>`;
            });

            html += `<tr>
                <td>${idx+1}</td><td style="text-align:left; font-weight:600;">${khoa}</td>
                <td>-</td><td>${cu}</td><td>${moi}</td><td>${den}</td>
                <td>${ra}</td><td>${v_on}</td><td>${v_nang}</td><td>${ck}</td><td>${bo}</td><td>${tv}</td><td>${cv}</td>
                <td class="txt-bold" style="background-color:#fef9c3;">${conLai}</td>
                ${ptsHtml}
            </tr>`;
        });

        // Hàng của Khoa Khám Bệnh
        const matchKKB = todayData.find(r => r["Khoa"] === "KHOA KHÁM BỆNH") || {};
        let khamNgoai = Number(matchKKB.luotKhamNgoaiTru || 0);
        totals.kham += khamNgoai;

        html += `<tr>
            <td>${CLINICAL_KHOAS.length + 1}</td><td style="text-align:left; font-weight:600;">KHOA KHÁM BỆNH</td>
            <td class="txt-bold" style="color:#0284c7;">${khamNgoai}</td>
            <td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td>
            ${CLINICAL_PROCEDURES.map(() => `<td>-</td>`).join('')}
        </tr>`;

        // Dòng tổng cộng toàn viện
        let ptsTotalHtml = CLINICAL_PROCEDURES.map(p => `<td>${totals[p.field]}</td>`).join('');
        html += `<tr class="bg-total">
            <td colspan="2">TỔNG TOÀN VIỆN</td><td style="color:#0284c7;">${totals.kham}</td>
            <td>${totals.cu}</td><td>${totals.moi}</td><td>${totals.den}</td>
            <td>${totals.ra}</td><td>${totals.v_on}</td><td>${totals.v_nang}</td><td>${totals.c_khoa}</td><td>${totals.bo}</td><td>${totals.tvong}</td><td>${totals.cvien}</td>
            <td style="background-color:#fef08a;">${totals.conlai}</td>
            ${ptsTotalHtml}
        </tr>`;

        tby.innerHTML = html;
    }

    function renderXetNghiemTable(data) {
        const todayStr = new Date().toISOString().split('T')[0];
        // Bộ lọc lấy bản ghi do khoa Xét nghiệm gửi lên trong ngày
        const todayXn = data.filter(r => r["Ngày"] === todayStr && r["Khoa"] === "KHOA XÉT NGHIỆM");

        const thd = document.getElementById('thdXetNghiem');
        thd.innerHTML = `<tr><th>STT</th><th style="text-align:left;">Khoa Lâm Sàng Chỉ Định</th>${XN_SERVICES.map(s => `<th>${s.label}</th>`).join('')}</tr>`;

        const tby = document.getElementById('tbyXetNghiem');
        let html = "";

        CLINICAL_KHOAS.forEach((khoa, index) => {
            const match = todayXn.find(r => r["Loại"] === khoa) || {};
            html += `<tr>
                <td>${index+1}</td><td style="text-align:left; font-weight:600;">${khoa}</td>
                ${XN_SERVICES.map(s => `<td>${Number(match[s.field] || 0)}</td>`).join('')}
            </tr>`;
        });

        // Điền dòng Tổng Toàn Viện bóc tách sẵn từ Payload của khoa Xét nghiệm gửi lên
        const matchTong = todayXn.find(r => r["Loại"] === "TỔNG TOÀN VIỆN") || {};
        html += `<tr class="bg-total">
            <td colspan="2">TỔNG TOÀN VIỆN GHI NHẬN</td>
            ${XN_SERVICES.map(s => `<td>${Number(matchTong[s.field] || 0)}</td>`).join('')}
        </tr>`;

        tby.innerHTML = html;
    }

    window.onload = loadDashboardData;
</script>
</body>
</html>
