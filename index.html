<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Nhập Báo Cáo Giao Ban</title>
    <style>
        :root { --primary: #0284c7; --bg: #f1f5f9; --card-bg: #ffffff; --text: #1e293b; --border: #e2e8f0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .login-card { max-width: 450px; margin: 80px auto; background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); text-align: center; }
        .login-card h2 { color: var(--primary); margin-bottom: 20px; font-size: 20px; }
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        .main-form { display: none; background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .header-area { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 25px; }
        .header-title h2 { margin: 0; color: var(--primary); font-size: 22px; text-transform: uppercase; }
        .section-title { font-size: 14px; font-weight: bold; color: #334155; border-left: 4px solid var(--primary); padding-left: 10px; margin: 25px 0 15px 0; text-transform: uppercase; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .input-item { display: flex; flex-direction: column; }
        .input-item label { font-size: 12px; color: #64748b; margin-bottom: 5px; font-weight: 500; }
        .input-item input { padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; font-weight: bold; background-color: #f8fafc; }
        .input-item input:focus { border-color: var(--primary); background-color: #fff; outline: none; }
        .btn-box { margin-top: 30px; display: flex; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
        .btn-blue { background-color: #0284c7; color: white; }
        .btn-gray { background-color: #64748b; color: white; }
        .btn-red { background-color: #ef4444; color: white; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); display: none; justify-content: center; align-items: center; font-weight: bold; color: var(--primary); font-size: 16px; z-index: 9999; }
    </style>
</head>
<body>

<div id="loading">Đang truyền tải dữ liệu đồng bộ lên Google Sheets...</div>

<div class="container">
    <div class="login-card" id="loginBlock">
        <h2>HỆ THỐNG GIAO BAN BỆNH VIỆN</h2>
        <div class="form-group">
            <label>Nhập Token xác thực của khoa:</label>
            <input type="password" id="txtToken" placeholder="Mã bảo mật khoa...">
        </div>
        <button class="btn btn-blue" style="width:100%" onclick="loginSystem()">ĐĂNG NHẬP</button>
    </div>

    <form class="main-form" id="formReport" onsubmit="sendReportData(event)">
        <div class="header-area">
            <div class="header-title">
                <small style="color: #64748b; font-weight: 600;">ĐƠN VỊ ĐANG BÁO CÁO:</small>
                <h2 id="txtTenKhoa">-</h2>
            </div>
            <div>
                <a href="dashboard.html" class="btn btn-gray" style="margin-right: 8px;">📊 TRANG XEM DASHBOARD</a>
                <button type="button" class="btn btn-red" onclick="logoutSystem()">ĐĂNG XUẤT</button>
            </div>
        </div>

        <div id="grLamSang">
            <div class="section-title">I. Số liệu lâm sàng (Bệnh nhân điều trị nội trú)</div>
            <div class="form-grid">
                <div class="input-item"><label>Bệnh cũ hôm trước</label><input type="number" name="benhCu" value="0" min="0"></div>
                <div class="input-item"><label>Bệnh nhân mới vào</label><input type="number" name="benhMoi" value="0" min="0"></div>
                <div class="input-item"><label>Khoa khác chuyển đến</label><input type="number" name="chuyenKhoa" value="0" min="0"></div>
                <div class="input-item"><label>Xuất viện</label><input type="number" name="xuatVien" value="0" min="0"></div>
                <div class="input-item"><label>Xin về</label><input type="number" name="xinVe" value="0" min="0"></div>
                <div class="input-item"><label>Bỏ viện</label><input type="number" name="boVe" value="0" min="0"></div>
                <div class="input-item"><label>Tử vong</label><input type="number" name="tuVong" value="0" min="0"></div>
                <div class="input-item"><label>Chuyển viện khác</label><input type="number" name="chuyenVien" value="0" min="0"></div>
            </div>
        </div>

        <div id="grCanLamSang">
            <div class="section-title">II. Thống kê hoạt động cận lâm sàng</div>
            <div class="form-grid">
                <div class="input-item"><label>PROCALCITONIN</label><input type="number" name="procalcitonin" value="0" min="0"></div>
                <div class="input-item"><label>BNP</label><input type="number" name="bnp" value="0" min="0"></div>
                <div class="input-item"><label>KHÍ MÁU ĐỘNG MẠCH</label><input type="number" name="khiMauDongMach" value="0" min="0"></div>
                <div class="input-item"><label>NỘI SOI DẠ DÀY/TÁ TRÀNG</label><input type="number" name="noiSoi" value="0" min="0"></div>
                <div class="input-item"><label>CHỤP XQ NGOẠI TRÚ</label><input type="number" name="xqNgoaiTru" value="0" min="0"></div>
                <div class="input-item"><label>CHỤP XQ NỘI TRÚ</label><input type="number" name="xqNoiTru" value="0" min="0"></div>
                <div class="input-item"><label>SIÊU ÂM NGOẠI TRÚ</label><input type="number" name="sieuAmNgoaiTru" value="0" min="0"></div>
                <div class="input-item"><label>SIÊU ÂM NỘI TRÚ</label><input type="number" name="sieuAmNoiTru" value="0" min="0"></div>
                <div class="input-item"><label>XÉT NGHIỆM NGOẠI TRÚ</label><input type="number" name="xnNgoaiTru" value="0" min="0"></div>
                <div class="input-item"><label>XÉT NGHIỆM NỘI TRÚ</label><input type="number" name="xnNoiTru" value="0" min="0"></div>
            </div>
        </div>

        <div class="btn-box">
            <button type="submit" class="btn btn-blue" style="font-size: 15px; padding: 12px 30px;">GỬI / CẬP NHẬT BÁO CÁO</button>
        </div>
    </form>
</div>

<script>
    // THAY ĐƯỜNG LINK WEB APP PHIÊN BẢN MỚI CỦA BẠN VÀO ĐÂY
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxjpIKetrgdcbAUtyLBFJNgUzjurATrcZQXDRaU7pbqpY_ZHPRvYvB7eK_8h7c2_E_2/exec';

    const MAP_TOKENS = {
        "CAPCUU2026": "KHOA CẤP CỨU - HSTC - CHỐNG ĐỘC", 
        "NGOAI2026": "KHOA NGOẠI TỔNG HỢP",
        "NHI2026": "KHOA NHI", 
        "NOITIMMACH2026": "KHOA NỘI TIM MẠCH - LÃO HỌC",
        "NOITONGHOP2026": "KHOA NỘI TỔNG HỢP", 
        "GMHS2026": "KHOA PHẪU THUẬT GÂY MÊ HỒI SỨC",
        "SAN2026": "KHOA PHỤ SẢN", 
        "TRUYENNHIEM2026": "KHOA TRUYỀN NHIỄM",
        "YHCT2026": "KHOA Y DƯỢC CỔ TRUYỀN", 
        "LCK2026": "KHOA LIÊN CHUYÊN KHOA",
        "KKB2026": "TỔNG LƯỢT KHÁM NGOẠI TRÚ", 
        "CDHA2026": "KHOA CHẨN ĐOÁN HÌNH ẢNH",
        "XETNGHIEM2026": "KHOA XÉT NGHIỆM"
    };

    window.onload = function() {
        const savedToken = localStorage.getItem('hospital_token');
        if (savedToken && MAP_TOKENS[savedToken]) { renderFormView(savedToken); }
    };

    function loginSystem() {
        const tok = document.getElementById('txtToken').value.trim().toUpperCase();
        if (MAP_TOKENS[tok]) {
            localStorage.setItem('hospital_token', tok);
            renderFormView(tok);
        } else {
            alert('Mã bảo mật Token đơn vị không tồn tại!');
        }
    }

    function renderFormView(token) {
        document.getElementById('loginBlock').style.display = 'none';
        const form = document.getElementById('formReport');
        form.style.display = 'block';
        document.getElementById('txtTenKhoa').innerText = MAP_TOKENS[token];

        const inputs = form.querySelectorAll('input[type="number"]');
        inputs.forEach(i => { i.disabled = false; i.value = 0; });
        
        document.getElementById('grLamSang').style.display = 'block';
        document.getElementById('grCanLamSang').style.display = 'block';

        if (token === "CDHA2026") {
            document.getElementById('grLamSang').style.display = 'none';
            inputs.forEach(i => {
                if(!['xqNgoaiTru', 'xqNoiTru', 'sieuAmNgoaiTru', 'sieuAmNoiTru'].includes(i.name)) i.disabled = true;
            });
        } else if (token === "XETNGHIEM2026") {
            document.getElementById('grLamSang').style.display = 'none';
            inputs.forEach(i => {
                if(!['xnNgoaiTru', 'xnNoiTru', 'procalcitonin', 'bnp', 'khiMauDongMach'].includes(i.name)) i.disabled = true;
            });
        } else {
            document.getElementById('grCanLamSang').style.display = 'none';
            inputs.forEach(i => {
                if(!['benhCu', 'benhMoi', 'chuyenKhoa', 'xuatVien', 'xinVe', 'boVe', 'tuVong', 'chuyenVien'].includes(i.name)) i.disabled = true;
            });
        }
    }

    async function sendReportData(e) {
        e.preventDefault();
        document.getElementById('loading').style.display = 'flex';

        const currentToken = localStorage.getItem('hospital_token');
        const encodedParams = new URLSearchParams();
        encodedParams.append('khoa', MAP_TOKENS[currentToken]);

        const inputs = document.getElementById('formReport').querySelectorAll('input[type="number"]');
        inputs.forEach(i => {
            if(!i.disabled) { encodedParams.append(i.name, i.value || 0); }
        });

        try {
            const res = await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'cors',
                redirect: 'follow',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: encodedParams.toString()
            });
            const statusText = await res.text();
            if(statusText.trim() === "SUCCESS") {
                alert('Dữ liệu giao ban đã được đồng bộ thành công!');
                window.location.href = 'dashboard.html';
            } else {
                alert('Lỗi phản hồi hệ thống: ' + statusText);
            }
        } catch (error) {
            console.error(error);
            alert('Lỗi đường truyền! Hãy kiểm tra lại cấu hình phiên bản Apps Script.');
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function logoutSystem() {
        localStorage.removeItem('hospital_token');
        location.reload();
    }
</script>
</body>
</html>
