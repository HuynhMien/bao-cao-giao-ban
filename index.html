<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhập Báo Cáo Giao Ban - BV ĐKKV Hồng Ngự</title>
    <style>
        :root { --primary: #0284c7; --bg: #f1f5f9; --card-bg: #ffffff; --text: #1e293b; --border: #cbd5e1; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1350px; margin: 0 auto; }
        .login-card { max-width: 450px; margin: 80px auto; background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); text-align: center; }
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
        .form-group input { width: 100%; padding: 11px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        .main-form { display: none; background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .header-area { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 25px; }
        .header-title h2 { margin: 0; color: var(--primary); font-size: 22px; text-transform: uppercase; }
        .section-title { font-size: 15px; font-weight: bold; color: #334155; border-left: 4px solid var(--primary); padding-left: 10px; margin: 25px 0 15px 0; text-transform: uppercase; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .input-item { display: flex; flex-direction: column; margin-bottom: 15px; }
        .input-item label { font-size: 15px; color: #64748b; margin-bottom: 5px; font-weight: 500; }
        .input-item input { padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 15px; font-weight: bold; background-color: #f8fafc; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: center; }
        th { background-color: #f1f5f9; color: #334155; font-weight: bold; }
        .table-input { width: 85px; padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; font-weight: bold; text-align: center; }
        .btn { padding: 12px 24px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; }
        .btn-blue { background-color: #0284c7; color: white; }
        .btn-gray { background-color: #64748b; color: white; }
        .btn-red { background-color: #ef4444; color: white; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; font-weight: bold; color: var(--primary); z-index: 9999; }
    </style>
</head>
<body>

<div id="loading">🚀 Đang gửi báo cáo...</div>

<div class="container">
    <div class="login-card" id="loginBlock">
        <h2 style="color:#0284c7;">BỆNH VIỆN ĐKKV HỒNG NGỰ</h2>
        <div class="form-group">
            <label>Nhập tài khoản:</label>
            <input type="password" id="txtToken" placeholder="Mã khoa..." onkeydown="if(event.key === 'Enter') loginSystem()">
        </div>
        <button class="btn btn-blue" style="width:100%;" onclick="loginSystem()">ĐĂNG NHẬP</button>
    </div>

    <form class="main-form" id="formReport" onsubmit="sendReportData(event)">
        <div class="header-area">
            <div class="header-title">
                <small style="color: #64748b; font-weight:600;">ĐƠN VỊ BÁO CÁO:</small>
                <h2 id="txtTenKhoa">-</h2>
            </div>
            <div>
                <a href="dashboard.html" class="btn btn-gray" style="margin-right: 8px;">📊 SỐ LIỆU TỔNG HỢP</a>
                <button type="button" class="btn btn-red" onclick="logoutSystem()">ĐĂNG XUẤT</button>
            </div>
        </div>

        <div id="grLamSang" style="display:none;">
            <div class="section-title">Số liệu tình hình người bệnh điều trị nội trú</div>
            <div class="form-grid">
                <div class="input-item"><label>Bệnh cũ hôm trước</label><input type="number" name="benhCu" value="0" min="0"></div>
                <div class="input-item"><label>Bệnh mới vào</label><input type="number" name="benhMoi" value="0" min="0"></div>
                <div class="input-item"><label>Khoa khác chuyển đến</label><input type="number" name="chuyenKhoa" value="0" min="0"></div>
                <div class="input-item"><label>Xuất viện</label><input type="number" name="xuatVien" value="0" min="0"></div>
                <div class="input-item"><label>Xin về (Bệnh ổn)</label><input type="number" name="xinVeBenhOn" value="0" min="0"></div>
                <div class="input-item"><label>Xin về (Bệnh nặng)</label><input type="number" name="xinVeBenhNang" value="0" min="0"></div>
                <div class="input-item"><label>Chuyển đi các khoa</label><input type="number" name="chuyenDiCacKhoa" value="0" min="0"></div>
                <div class="input-item"><label>Bỏ viện</label><input type="number" name="boVe" value="0" min="0"></div>
                <div class="input-item"><label>Tử vong</label><input type="number" name="tuVong" value="0" min="0"></div>
                <div class="input-item"><label>Chuyển viện</label><input type="number" name="chuyenVien" value="0" min="0"></div>
            </div>

            <div class="section-title" style="color: #0369a1; border-left-color: #0369a1;">Số liệu phẫu thuật - thủ thuật tại khoa</div>
            <div class="form-grid" id="containerThủThuatLamSang"></div>
        </div>

        <div id="grKhamBenh" style="display:none;">
            <div class="section-title">Số liệu hoạt động ngoại trú</div>
            <div class="form-grid" style="grid-template-columns: 300px;">
                <div class="input-item">
                    <label style="font-weight: bold; color: #0284c7;">TỔNG LƯỢT KHÁM NGOẠI TRÚ</label>
                    <input type="number" name="luotKhamNgoaiTru" value="0" min="0" style="padding:15px; font-size:18px; border:2px solid #0284c7;">
                </div>
            </div>
        </div>

        <div id="grCanLamSang" style="display:none;">
            <div id="wrapperBangCLS" style="display:none;">
                <div class="section-title">Bảng chỉ số chi tiết theo khoa lâm sàng chỉ định</div>
                <div style="overflow-x: auto;">
                    <table id="tblInputCLS">
                        <thead id="thdInputCLS"></thead>
                        <tbody id="tbyInputCLS"></tbody>
                    </table>
                </div>
            </div>

            <div class="section-title" id="titleKhoiTong">Số liệu báo cáo tổng toàn viện</div>
            <div class="form-grid" id="containerKhoiTong"></div>
        </div>

        <div class="btn-box" style="margin-top:30px;">
            <button type="submit" class="btn btn-blue" style="font-size:15px; padding:14px 45px;">GỬI BÁO CÁO</button>
        </div>
    </form>
</div>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbx8tdjnnSyAe2TgP3enpVkqGbm1HjyEA1HDc8GUDRRWJbp36XeiH0odTcl4Pnlt6DM/exec';

    const CLINICAL_PROCEDURES = [
        { field: "tiemKhop", label: "TIÊM KHỚP" }
    ];

    // Cấu hình danh mục dịch vụ nhập chi tiết tại bảng
    const CLS_TABLE_SERVICES = {
        "XETNGHIEM": [
            { field: "procalcitonin", label: "Procalcitonin" },
            { field: "bnp", label: "BNP" },
            { field: "khiMauDongMach", label: "Khí Máu ĐM" }
        ]
    };

    // Cấu hình danh mục dịch vụ nhập gộp dạng Ô TỔNG toàn viện
    const CLS_TOTAL_SERVICES = {
        "XETNGHIEM": [
            { field: "xnNgoaiTru", label: "TỔNG XN NGOẠI TRÚ" },
            { field: "xnNoiTru", label: "TỔNG XN NỘI TRÚ" },
            { field: "nhomMauO", label: "TỔNG NHÓM MÁU O" },
            { field: "nhomMauA", label: "TỔNG NHÓM MÁU A" },
            { field: "nhomMauB", label: "TỔNG NHÓM MÁU B" },
            { field: "nhomMauAB", label: "TỔNG NHÓM MÁU AB" }
        ],
        "CDHA": [
            { field: "noiSoi", label: "TỔNG LƯỢT NỘI SOI" },
            { field: "xqNgoaiTru", label: "TỔNG XQ NGOẠI" },
            { field: "xqNoiTru", label: "TỔNG XQ NỘI" },
            { field: "sieuAmNgoaiTru", label: "TỔNG SIÊU ÂM NGOẠI" },
            { field: "sieuAmNoiTru", label: "TỔNG SIÊU ÂM NỘI" }
        ]
    };

    const MAP_TOKENS = {
        "CAPCUU": "KHOA CẤP CỨU - HSTC - CHỐNG ĐỘC", "NGOAI": "KHOA NGOẠI TỔNG HỢP", "NHI": "KHOA NHI", 
        "NOITIMMACH": "KHOA NỘI TIM MẠCH - LÃO HỌC", "NOITONGHOP": "KHOA NỘI TỔNG HỢP", "GMHS": "KHOA PHẪT THUẬT GÂY MÊ HỒI SỨC",
        "SAN": "KHOA PHỤ SẢN", "TRUYENNHIEM": "KHOA TRUYỀN NHIỄM", "YHCT": "KHOA Y DƯỢC CỔ TRUYỀN", 
        "LCK": "KHOA LIÊN CHUYÊN KHOA", "KKB": "KHOA KHÁM BỆNH", 
        "CDHA": "KHOA CHẨN ĐOÁN HÌNH ẢNH", "XETNGHIEM": "KHOA XÉT NGHIỆM", "KHTH": "KẾ HOẠCH TỔNG HỢP"
    };

    const CLINICAL_KHOAS = [
        "KHOA CẤP CỨU - HSTC - CHỐNG ĐỘC", "KHOA PHẪU THUẬT GÂY MÊ HỒI SỨC", "KHOA NGOẠI TỔNG HỢP", "KHOA PHỤ SẢN", 
        "KHOA NỘI TỔNG HỢP", "KHOA NỘI TIM MẠCH - LÃO HỌC", "KHOA NHI", "KHOA TRUYỀN NHIỄM", "KHOA Y DƯỢC CỔ TRUYỀN", 
        "KHOA LIÊN CHUYÊN KHOA", "KHOA KHÁM BỆNH", "KẾ HOẠCH TỔNG HỢP"
    ];

    window.onload = function() {
        const savedToken = localStorage.getItem('hospital_token');
        if (savedToken) {
            if (savedToken === "KHTH") {
                window.location.href = 'dashboard.html';
            } else if (MAP_TOKENS[savedToken]) { 
                renderFormView(savedToken); 
            }
        }
    };

    function loginSystem() {
        const tok = document.getElementById('txtToken').value.trim().toUpperCase();
        if (tok === "KHTH") {
            localStorage.setItem('hospital_token', tok);
            window.location.href = 'dashboard.html';
        } else if (MAP_TOKENS[tok]) {
            localStorage.setItem('hospital_token', tok);
            renderFormView(tok);
        } else { 
            alert('Sai mã Token xác thực!'); 
        }
    }

    function renderFormView(token) {
        document.getElementById('loginBlock').style.display = 'none';
        document.getElementById('formReport').style.display = 'block';
        document.getElementById('txtTenKhoa').innerText = MAP_TOKENS[token];
        
        document.getElementById('grLamSang').style.display = 'none';
        document.getElementById('grKhamBenh').style.display = 'none';
        document.getElementById('grCanLamSang').style.display = 'none';
        document.getElementById('wrapperBangCLS').style.display = 'none';

        if (token === "KKB") {
            document.getElementById('grKhamBenh').style.display = 'block';
        } else if (token === "XETNGHIEM") {
            document.getElementById('grCanLamSang').style.display = 'block';
            document.getElementById('wrapperBangCLS').style.display = 'block'; // Hiện bảng chi tiết
            
            // 1. Dựng bảng nhập chi tiết cho Procalcitonin, BNP, Khí Máu
            const thd = document.getElementById('thdInputCLS');
            const tby = document.getElementById('tbyInputCLS');
            const tableServices = CLS_TABLE_SERVICES[token];

            thd.innerHTML = `<tr><th>STT</th><th style="text-align:left; min-width:280px;">Khoa Lâm Sàng Chỉ Định</th>${tableServices.map(s => `<th>${s.label}</th>`).join('')}</tr>`;

            let bodyHtml = "";
            CLINICAL_KHOAS.forEach((khoa, index) => {
                let rowInputs = "";
                tableServices.forEach(s => { 
                    rowInputs += `<td><input type="number" class="table-input" data-khoa="${khoa}" data-field="${s.field}" value="0" min="0"></td>`; 
                });
                bodyHtml += `<tr><td>${index+1}</td><td style="text-align:left; font-weight:600;">${khoa}</td>${rowInputs}</tr>`;
            });
            tby.innerHTML = bodyHtml;

            // 2. Dựng các ô nhập số liệu TỔNG TOÀN VIỆN phía dưới (XN Ngoại, XN Nội, Nhóm máu)
            document.getElementById('titleKhoiTong').innerText = "Số liệu báo cáo TỔNG TOÀN VIỆN (Xét nghiệm ngoại/nội trú & Nhóm máu)";
            const fieldsXN = CLS_TOTAL_SERVICES[token].map(s => s.field);
            const labelsXN = CLS_TOTAL_SERVICES[token].map(s => s.label);
            buildTotalFields(fieldsXN, labelsXN);

        } else if (token === "CDHA") {
            document.getElementById('grCanLamSang').style.display = 'block';
            document.getElementById('titleKhoiTong').innerText = "Số lượt tổng hoạt động Chẩn Đoán Hình Ảnh toàn viện";
            
            const fieldsCDHA = CLS_TOTAL_SERVICES[token].map(s => s.field);
            const labelsCDHA = CLS_TOTAL_SERVICES[token].map(s => s.label);
            buildTotalFields(fieldsCDHA, labelsCDHA);
        } else {
            document.getElementById('grLamSang').style.display = 'block';
            
            const containerTT = document.getElementById('containerThủThuatLamSang');
            let htmlTT = "";
            CLINICAL_PROCEDURES.forEach(p => {
                htmlTT += `<div class="input-item">
                    <label style="font-weight: bold; color: #0369a1;">${p.label} TRONG NGÀY</label>
                    <input type="number" name="${p.field}" value="0" min="0" style="background-color: #f0f9ff; border: 2px solid #bae6fd; padding:12px; font-size:16px;">
                </div>`;
            });
            containerTT.innerHTML = htmlTT;
        }
    }

    function buildTotalFields(fields, labels) {
        const container = document.getElementById('containerKhoiTong');
        let html = "";
        fields.forEach((f, idx) => {
            html += `<div class="input-item">
                <label style="font-weight:bold; color:#0284c7;">${labels[idx]}</label>
                <input type="number" name="${f}" class="total-field" value="0" min="0" style="padding:12px; font-size:16px;">
            </div>`;
        });
        container.innerHTML = html;
    }

    async function sendReportData(e) {
        e.preventDefault();
        document.getElementById('loading').style.display = 'flex';
        const currentToken = localStorage.getItem('hospital_token');
        const encodedParams = new URLSearchParams();
        encodedParams.append('khoa', MAP_TOKENS[currentToken]);

        if (currentToken === "XETNGHIEM") {
            let dataPayload = [];
            // Thu thập dữ liệu chi tiết của 11 khoa từ bảng (Procalcitonin, bnp, khiMauDongMach)
            CLINICAL_KHOAS.forEach(khoa => {
                let obj = { loai: khoa };
                document.querySelectorAll(`input[data-khoa="${khoa}"]`).forEach(i => { 
                    obj[i.getAttribute('data-field')] = Number(i.value || 0); 
                });
                // Thiết lập mặc định 0 cho ngoại/nội trú tại các khoa lẻ để không bị rỗng cấu trúc
                obj.xnNgoaiTru = 0;
                obj.xnNoiTru = 0;
                dataPayload.push(obj);
            });

            // Thu thập dữ liệu ô Tổng Toàn Viện (XN Ngoại trú, XN Nội trú, Nhóm máu)
            let objTong = { loai: "TỔNG TOÀN VIỆN" };
            document.querySelectorAll('.total-field').forEach(i => { 
                objTong[i.name] = Number(i.value || 0); 
            });
            dataPayload.push(objTong);
            
            encodedParams.append('payloadData', JSON.stringify(dataPayload));

        } else if (currentToken === "CDHA") {
            let dataPayload = [];
            let objTong = { loai: "TỔNG TOÀN VIỆN" };
            document.querySelectorAll('.total-field').forEach(i => { 
                objTong[i.name] = Number(i.value || 0); 
            });
            dataPayload.push(objTong);
            encodedParams.append('payloadData', JSON.stringify(dataPayload));
        } else if (currentToken === "KKB") {
            encodedParams.append('luotKhamNgoaiTru', document.querySelector('input[name="luotKhamNgoaiTru"]').value || 0);
        } else {
            document.getElementById('grLamSang').querySelectorAll('input[type="number"]').forEach(i => { 
                encodedParams.append(i.name, i.value || 0); 
            });
        }

        try {
            const res = await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: encodedParams.toString()
            });
            if((await res.text()).trim() === "SUCCESS") {
                alert('Gửi báo cáo thành công!');
                window.location.href = 'dashboard.html';
            } else { alert('Lỗi đồng bộ dữ liệu.'); }
        } catch (error) { alert('Lỗi kết nối mạng.'); }
        finally { document.getElementById('loading').style.display = 'none'; }
    }

    function logoutSystem() { localStorage.removeItem('hospital_token'); location.reload(); }
</script>
</body>
</html>
