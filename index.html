<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Nhập Báo Cáo Giao Ban - Bệnh Viện Hồng Ngự</title>
    <style>
        :root { --primary: #0284c7; --bg: #f1f5f9; --card-bg: #ffffff; --text: #1e293b; --border: #cbd5e1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }
        .login-card { max-width: 450px; margin: 80px auto; background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); text-align: center; }
        .login-card h2 { color: var(--primary); margin-bottom: 20px; font-size: 20px; }
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        .main-form { display: none; background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .header-area { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 25px; }
        .header-title h2 { margin: 0; color: var(--primary); font-size: 22px; text-transform: uppercase; }
        .section-title { font-size: 15px; font-weight: bold; color: #334155; border-left: 4px solid var(--primary); padding-left: 10px; margin: 25px 0 15px 0; text-transform: uppercase; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .input-item { display: flex; flex-direction: column; }
        .input-item label { font-size: 12px; color: #64748b; margin-bottom: 5px; font-weight: 500; }
        .input-item input { padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; font-weight: bold; background-color: #f8fafc; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid var(--border); padding: 8px; text-align: center; }
        th { background-color: #f1f5f9; }
        .td-left { text-align: left; font-weight: bold; background-color: #f8fafc; }
        .table-input { width: 100px; padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; font-weight: bold; text-align: center; }
        .btn-box { margin-top: 30px; }
        .btn { padding: 12px 24px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
        .btn-blue { background-color: #0284c7; color: white; }
        .btn-gray { background-color: #64748b; color: white; }
        .btn-red { background-color: #ef4444; color: white; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; font-weight: bold; color: var(--primary); font-size: 16px; z-index: 9999; }
    </style>
</head>
<body>

<div id="loading">Đang thực hiện truyền tải dữ liệu đồng bộ lên Google Sheets...</div>

<div class="container">
    <div class="login-card" id="loginBlock">
        <h2>HỆ THỐNG GIAO BAN BỆNH VIỆN</h2>
        <div class="form-group">
            <label>Nhập Token xác thực khoa phòng:</label>
            <input type="password" id="txtToken" placeholder="Mã bảo mật...">
        </div>
        <button class="btn btn-blue" style="width:100%" onclick="loginSystem()">ĐĂNG NHẬP</button>
    </div>

    <form class="main-form" id="formReport" onsubmit="sendReportData(event)">
        <div class="header-area">
            <div class="header-title">
                <small style="color: #64748b; font-weight: 600;">ĐƠN VỊ ĐANG BÁO CÁO:</small>
                <h2 id="txtTenKhoa">-</h2>
            </div>
            <div>
                <a href="dashboard.html" class="btn btn-gray" style="margin-right: 8px;">📊 TRANG DASHBOARD TỔNG HỢP</a>
                <button type="button" class="btn btn-red" onclick="logoutSystem()">ĐĂNG XUẤT</button>
            </div>
        </div>

        <div id="grLamSang" style="display:none;">
            <div class="section-title">Số liệu lâm sàng bệnh nhân nội trú</div>
            <div class="form-grid">
                <div class="input-item"><label>Bệnh cũ hôm trước</label><input type="number" name="benhCu" value="0" min="0"></div>
                <div class="input-item"><label>Bệnh nhân mới vào</label><input type="number" name="benhMoi" value="0" min="0"></div>
                <div class="input-item"><label>Khoa khác chuyển đến</label><input type="number" name="chuyenKhoa" value="0" min="0"></div>
                <div class="input-item"><label>Xuất viện</label><input type="number" name="xuatVien" value="0" min="0"></div>
                <div class="input-item"><label>Xin về</label><input type="number" name="xinVe" value="0" min="0"></div>
                <div class="input-item"><label>Bỏ viện</label><input type="number" name="boVe" value="0" min="0"></div>
                <div class="input-item"><label>Tử vong</label><input type="number" name="tuVong" value="0" min="0"></div>
                <div class="input-item"><label>Chuyển viện khác</label><input type="number" name="chuyenVien" value="0" min="0"></div>
            </div>
        </div>

        <div id="grCanLamSang" style="display:none;">
            <div class="section-title">Bảng nhập chi tiết hoạt động cận lâm sàng cho các khoa phòng</div>
            <div style="overflow-x: auto;">
                <table id="tblInputCLS">
                    <thead>
                        <tr id="thrCLS"></tr>
                    </thead>
                    <tbody id="tbyInputCLS"></tbody>
                </table>
            </div>
        </div>

        <div class="btn-box">
            <button type="submit" class="btn btn-blue" style="font-size: 15px; padding: 12px 40px;">GỬI / CẬP NHẬT BÁO CÁO MỚI NHẤT</button>
        </div>
    </form>
</div>

<script>
    // Đồng bộ chính xác TÊN KHOA trên hệ thống
    const MAP_TOKENS = {
        "CAPCUU2026": "KHOA CẤP CỨU - HSTC - CHỐNG ĐỘC", 
        "NGOAI2026": "KHOA NGOẠI TỔNG HỢP",
        "NHI2026": "KHOA NHI", 
        "NOITIMMACH2026": "KHOA NỘI TIM MẠCH - LÃO HỌC",
        "NOITONGHOP2026": "KHOA NỘI TỔNG HỢP", 
        "GMHS2026": "KHOA PHẪU THUẬT GÂY MÊ HỒI SỨC",
        "SAN2026": "KHOA PHỤ SẢN", 
        "TRUYENNHIEM2026": "KHOA TRUYỀN NHIỄM",
        "YHCT2026": "KHOA Y DƯỢC CỔ TRUYỀN", 
        "LCK2026": "KHOA LIÊN CHUYÊN KHOA",
        "KKB2026": "KHOA KHÁM BỆNH (TỔNG LƯỢT KHÁM NGOẠI TRÚ)", 
        "CDHA2026": "KHOA CHẨN ĐOÁN HÌNH ẢNH",
        "XETNGHIEM2026": "KHOA XÉT NGHIỆM"
    };

    // Danh sách các khoa lâm sàng để chỉ định chỉ tiêu cận lâm sàng
    const CLINICAL_KHOAS = [
        "KHOA CẤP CỨU - HSTC - CHỐNG ĐỘC", 
        "KHOA PHẪU THUẬT GÂY MÊ HỒI SỨC", 
        "KHOA NGOẠI TỔNG HỢP",
        "KHOA PHỤ SẢN", 
        "KHOA NỘI TỔNG HỢP", 
        "KHOA NỘI TIM MẠCH - LÃO HỌC", 
        "KHOA NHI",
        "KHOA TRUYỀN NHIỄM", 
        "KHOA Y DƯỢC CỔ TRUYỀN", 
        "KHOA LIÊN CHUYÊN KHOA", 
        "KHOA KHÁM BỆNH (TỔNG LƯỢT KHÁM NGOẠI TRÚ)"
    ];

    window.onload = function() {
        const savedToken = localStorage.getItem('hospital_token');
        if (savedToken && MAP_TOKENS[savedToken]) { renderFormView(savedToken); }
    };

    function loginSystem() {
        const tok = document.getElementById('txtToken').value.trim().toUpperCase();
        if (MAP_TOKENS[tok]) {
            localStorage.setItem('hospital_token', tok);
            renderFormView(tok);
        } else {
            alert('Mã bảo mật đơn vị không chính xác!');
        }
    }

    function renderFormView(token) {
        document.getElementById('loginBlock').style.display = 'none';
        document.getElementById('formReport').style.display = 'block';
        document.getElementById('txtTenKhoa').innerText = MAP_TOKENS[token];

        document.getElementById('grLamSang').style.display = 'none';
        document.getElementById('grCanLamSang').style.display = 'none';

        if (token === "CDHA2026") {
            document.getElementById('grCanLamSang').style.display = 'block';
            // Khoa CĐHA chịu trách nhiệm nhập: Nội soi, XQ Ngoại/Nội, Siêu âm Ngoại/Nội
            buildParaclinicalTable(
                ["noiSoi", "xqNgoaiTru", "xqNoiTru", "sieuAmNgoaiTru", "sieuAmNoiTru"], 
                ["Nội Soi", "XQ Ngoại Trú", "XQ Nội Trú", "Siêu Âm Ngoại Trú", "Siêu Âm Nội Trú"]
            );
        } else if (token === "XETNGHIEM2026") {
            document.getElementById('grCanLamSang').style.display = 'block';
            // Khoa Xét nghiệm nhập: Procalcitonin, BNP, Khí máu động mạch, Xét nghiệm Ngoại/Nội
            buildParaclinicalTable(
                ["procalcitonin", "bnp", "khiMauDongMach", "xnNgoaiTru", "xnNoiTru"], 
                ["Procalcitonin", "BNP", "Khí Máu ĐM", "Xét Nghiệm Ngoại", "Xét Nghiệm Nội Trú"]
            );
        } else {
            document.getElementById('grLamSang').style.display = 'block';
        }
    }

    function buildParaclinicalTable(fields, labels) {
        const thr = document.getElementById('thrCLS');
        const tby = document.getElementById('tbyInputCLS');
        
        let headerHtml = `<th>STT</th><th style="text-align:left; min-width:280px;">Khoa Lâm Sàng Chỉ Định</th>`;
        labels.forEach(l => { headerHtml += `<th>${l}</th>`; });
        thr.innerHTML = headerHtml;

        let bodyHtml = "";
        CLINICAL_KHOAS.forEach((khoa, index) => {
            let rowInputs = "";
            fields.forEach(f => {
                rowInputs += `<td><input type="number" class="table-input" data-khoa="${khoa}" data-field="${f}" value="0" min="0"></td>`;
            });
            bodyHtml += `<tr><td>${index+1}</td><td class="td-left">${khoa}</td>${rowInputs}</tr>`;
        });
        tby.innerHTML = bodyHtml;
    }

    async function sendReportData(e) {
        e.preventDefault();
        document.getElementById('loading').style.display = 'flex';
        const currentToken = localStorage.getItem('hospital_token');
        
        const encodedParams = new URLSearchParams();
        encodedParams.append('khoa', MAP_TOKENS[currentToken]);

        if (currentToken === "CDHA2026" || currentToken === "XETNGHIEM2026") {
            let dataPayload = [];
            CLINICAL_KHOAS.forEach(khoa => {
                let obj = { loai: khoa };
                let inputs = document.querySelectorAll(`input[data-khoa="${khoa}"]`);
                inputs.forEach(i => {
                    obj[i.getAttribute('data-field')] = Number(i.value || 0);
                });
                dataPayload.push(obj);
            });
            encodedParams.append('payloadData', JSON.stringify(dataPayload));
        } else {
            const inputs = document.getElementById('grLamSang').querySelectorAll('input[type="number"]');
            inputs.forEach(i => { encodedParams.append(i.name, i.value || 0); });
        }

        try {
            const res = await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'cors',
                redirect: 'follow',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: encodedParams.toString()
            });
            const statusText = await res.text();
            if(statusText.trim() === "SUCCESS") {
                alert('Đã đồng bộ thành công số liệu giao ban lên hệ thống!');
                window.location.href = 'dashboard.html';
            } else {
                alert('Gặp lỗi phản hồi hệ thống: ' + statusText);
            }
        } catch (error) {
            console.error(error);
            alert('Lỗi kết nối! Xin vui lòng kiểm tra lại URL Web App Apps Script.');
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function logoutSystem() {
        localStorage.removeItem('hospital_token');
        location.reload();
    }
</script>
</body>
</html>
