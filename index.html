<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhập Báo Cáo Giao Ban Hằng Ngày</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; color: #334155; }
        .form-container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #0284c7; margin-bottom: 25px; text-transform: uppercase; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 5px; font-size: 14px; }
        select, input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .section-title { background: #e2e8f0; padding: 8px 12px; font-weight: bold; margin-top: 20px; border-radius: 4px; color: #1e293b; }
        button { background: #0284c7; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 20px; width: 100%; transition: background 0.2s; }
        button:hover { background: #0369a1; }
        .btn-view { display: block; text-align: center; margin-top: 15px; color: #0284c7; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>✍️ CẬP NHẬT SỐ LIỆU BÁO CÁO GIAO BAN</h2>
    <form id="reportForm">
        <div class="grid-2">
            <div class="form-group">
                <label>Chọn Ngày Báo Cáo:</label>
                <input type="date" id="ngay" required>
            </div>
            <div class="form-group">
                <label>Đơn Vị / Khoa Phòng:</label>
                <select id="khoa" required>
                    <option value="KHOA CẤP CỨU - HSTC - CHỐNG ĐỘC">KHOA CẤP CỨU - HSTC - CHỐNG ĐỘC</option>
                    <option value="KHOA PHẪU THUẬT GÂY MÊ HỒI SỨC">KHOA PHẪU THUẬT GÂY MÊ HỒI SỨC</option>
                    <option value="KHOA NGOẠI TỔNG HỢP">KHOA NGOẠI TỔNG HỢP</option>
                    <option value="KHOA PHỤ SẢN">KHOA PHỤ SẢN</option>
                    <option value="KHOA NỘI TỔNG HỢP">KHOA NỘI TỔNG HỢP</option>
                    <option value="KHOA NỘI TIM MẠCH - LÃO HỌC">KHOA NỘI TIM MẠCH - LÃO HỌC</option>
                    <option value="KHOA NHI">KHOA NHI</option>
                    <option value="KHOA TRUYỀN NHIỄM">KHOA TRUYỀN NHIỄM</option>
                    <option value="KHOA Y DƯỢC CỔ TRUYỀN">KHOA Y DƯỢC CỔ TRUYỀN</option>
                    <option value="KHOA LIÊN CHUYÊN KHOA">KHOA LIÊN CHUYÊN KHOA</option>
                    <option value="KHOA KHÁM BỆNH">KHOA KHÁM BỆNH</option>
                </select>
            </div>
        </div>

        <div class="section-title">I. SỐ LIỆU LÂM SÀNG & ĐIỀU TRỊ</div>
        <div class="form-group" style="margin-top:10px;">
            <label>Tổng Lượt Khám Ngoại Trú (Chỉ dành cho Khoa Khám Bệnh):</label>
            <input type="number" id="luotKhamNgoaiTru" value="0" min="0">
        </div>
        <div class="grid-3">
            <div class="form-group">
                <label>Bệnh Cũ:</label>
                <input type="number" id="benhCu" value="0" min="0">
            </div>
            <div class="form-group">
                <label>Bệnh Mới:</label>
                <input type="number" id="benhMoi" value="0" min="0">
            </div>
            <div class="form-group">
                <label>Chuyển Đến:</label>
                <input type="number" id="chuyenKhoa" value="0" min="0">
            </div>
        </div>
        <div class="grid-3">
            <div class="form-group">
                <label>Ra Viện:</label>
                <input type="number" id="xuatVien" value="0" min="0">
            </div>
            <div class="form-group">
                <label>Xin Về (Ổn định):</label>
                <input type="number" id="xinVeBenhOn" value="0" min="0">
            </div>
            <div class="form-group">
                <label>Xin Về (Nặng):</label>
                <input type="number" id="xinVeBenhNang" value="0" min="0">
            </div>
        </div>
        <div class="grid-3">
            <div class="form-group">
                <label>Chuyển Khoa Đi:</label>
                <input type="number" id="chuyenDiCacKhoa" value="0" min="0">
            </div>
            <div class="form-group">
                <label>Bỏ Viện:</label>
                <input type="number" id="boVe" value="0" min="0">
            </div>
            <div class="form-group">
                <label>Tử Vong:</label>
                <input type="number" id="tuVong" value="0" min="0">
            </div>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label>Chuyển Viện Tuyển Trên:</label>
                <input type="number" id="chuyenVien" value="0" min="0">
            </div>
            <div class="form-group">
                <label>Còn Lại Thực Tế:</label>
                <input type="number" id="conLai" value="0" min="0">
            </div>
        </div>

        <div class="section-title">II. SỐ LIỆU CHỈ ĐỊNH CẬN LÂM SÀNG & THỦ THUẬT</div>
        <div class="grid-3" style="margin-top:10px;">
            <div class="form-group">
                <label>Procalcitonin:</label>
                <input type="number" id="procalcitonin" value="0" min="0">
            </div>
            <div class="form-group">
                <label>BNP:</label>
                <input type="number" id="bnp" value="0" min="0">
            </div>
            <div class="form-group">
                <label>Khí Máu Động Mạch:</label>
                <input type="number" id="khiMaoDongMach" value="0" min="0">
            </div>
        </div>
        <div class="grid-3">
            <div class="form-group" style="background:#f0fdf4; padding:5px; border-radius:4px;">
                <label style="color:#166534;">Tiêm Khớp:</label>
                <input type="number" id="tiemKhop" value="0" min="0"> </div>
            <div class="form-group">
                <label>XN Ngoại Trú:</label>
                <input type="number" id="xnNgoaiTru" value="0" min="0">
            </div>
            <div class="form-group">
                <label>XN Nội Trú:</label>
                <input type="number" id="xnNoiTru" value="0" min="0">
            </div>
        </div>

        <button type="submit" id="submitBtn">🚀 GỬI BÁO CÁO GIAO BAN</button>
    </form>
    
    <a href="dashboard.html" class="btn-view">📊 Xem màn hình Dashboard tổng hợp</a>
</div>

<script>
    // Điền ngày hiện tại làm mặc định
    document.getElementById('ngay').valueAsDate = new Date();

    const FORM_API = 'https://script.google.com/macros/s/AKfycbzSqAMImM51DwBgyJ_tNxZH442osdbtgQm2S0GkP4fKeEjahWJYMMh7ztOI1K27mFea/exec';

    document.getElementById('reportForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = 'Đang gửi dữ liệu lên hệ thống...';

        // Gom dữ liệu từ các ô input
        const formData = {
            action: "insertReport",
            ngay: document.getElementById('ngay').value,
            khoa: document.getElementById('khoa').value,
            luotKhamNgoaiTru: document.getElementById('luotKhamNgoaiTru').value,
            benhCu: document.getElementById('benhCu').value,
            benhMoi: document.getElementById('benhMoi').value,
            chuyenKhoa: document.getElementById('chuyenKhoa').value,
            xuatVien: document.getElementById('xuatVien').value,
            xinVeBenhOn: document.getElementById('xinVeBenhOn').value,
            xinVeBenhNang: document.getElementById('xinVeBenhNang').value,
            chuyenDiCacKhoa: document.getElementById('chuyenDiCacKhoa').value,
            boVe: document.getElementById('boVe').value,
            tuVong: document.getElementById('tuVong').value,
            chuyenVien: document.getElementById('chuyenVien').value,
            conLai: document.getElementById('conLai').value,
            procalcitonin: document.getElementById('procalcitonin').value,
            bnp: document.getElementById('bnp').value,
            khiMaoDongMach: document.getElementById('khiMaoDongMach').value,
            tiemKhop: document.getElementById('tiemKhop').value, // <-- ĐẨY LÊN API
            xnNgoaiTru: document.getElementById('xnNgoaiTru').value,
            xnNoiTru: document.getElementById('xnNoiTru').value
        };

        try {
            // Gửi dữ liệu bằng phương thức POST (hoặc cấu hình Apps Script tương đương của bạn)
            await fetch(FORM_API, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });
            alert('🎉 Gửi báo cáo khoa thành công!');
            // Reset các ô số về 0
            document.querySelectorAll('input[type="number"]').forEach(input => input.value = 0);
        } catch (error) {
            alert('Lỗi kết nối! Vui lòng thử lại.');
        } finally {
            btn.disabled = false;
            btn.innerText = '🚀 GỬI BÁO CÁO GIAO BAN';
        }
    });
</script>
</body>
</html>
